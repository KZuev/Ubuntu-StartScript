# ============================================================
#  Ubuntu Server Initial Setup — Configuration Template
#  Copy to config.conf, fill in values, then run:
#    sudo ./setup.sh
# ============================================================

# ─────────────────────────────────────────────
#  SYSTEM
# ─────────────────────────────────────────────

# Server hostname (e.g. web01, app-server, my-vps)
SETUP_HOSTNAME="myserver"

# Timezone — run `timedatectl list-timezones` to see options
# Examples: UTC  Europe/Moscow  Europe/Berlin  America/New_York
SETUP_TIMEZONE="UTC"

# Locale to generate and set as system default
SETUP_LOCALE="en_US.UTF-8"

# ─────────────────────────────────────────────
#  SWAP
# ─────────────────────────────────────────────

# Swap file size in GB. Set to 0 to skip.
# Recommended: 2 for VPS with ≤2GB RAM, 0 for servers with ≥8GB RAM
SETUP_SWAP_SIZE_GB="2"

# Kernel swappiness (0-100). 10 is good for servers — prefer RAM over swap
SETUP_SWAP_SWAPPINESS="10"

# ─────────────────────────────────────────────
#  NEW ADMIN USER
# ─────────────────────────────────────────────

# Create a new admin user (yes/no). Recommended: yes
# The password is prompted interactively at startup — never stored in this file.
SETUP_CREATE_USER="yes"

# Username for the new admin account (do NOT use root)
SETUP_NEW_USER="admin"

# Default shell: bash or fish
# NOTE: fish is user-friendly but not POSIX — scripts may differ
SETUP_NEW_USER_SHELL="bash"

# Your SSH public key — paste the full line from ~/.ssh/id_*.pub
# Example: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... user@machine
# REQUIRED if SETUP_SSH_PASSWORD_AUTH=no (otherwise you'll be locked out)
SETUP_SSH_PUBLIC_KEY="YOUR_PUBLIC_KEY_HERE"

# ─────────────────────────────────────────────
#  ROOT ACCOUNT
# ─────────────────────────────────────────────

# Lock root password after setup (yes/no)
# The account remains accessible via hosting console/rescue mode
# Recommended: yes — use the new sudo user instead
SETUP_DISABLE_ROOT_LOGIN="yes"

# ─────────────────────────────────────────────
#  SSH HARDENING
# ─────────────────────────────────────────────

# SSH port (default 22). Change to reduce automated scan noise.
# If changed, update SETUP_UFW_ALLOWED_PORTS to match!
SETUP_SSH_PORT="22"

# Allow root to log in via SSH: no / prohibit-password / yes
# Recommended: no
SETUP_SSH_PERMIT_ROOT_LOGIN="no"

# Allow password authentication: yes / no
# IMPORTANT: Set to no ONLY after setting a valid SETUP_SSH_PUBLIC_KEY
# The script will refuse to disable passwords without a key (lockout protection)
SETUP_SSH_PASSWORD_AUTH="no"

# Maximum authentication attempts before disconnecting
SETUP_SSH_MAX_AUTH_TRIES="3"

# Seconds before unauthenticated connection is dropped
SETUP_SSH_LOGIN_GRACE_TIME="30"

# Disable weak cryptographic algorithms (yes/no)
# May break very old SSH clients (< OpenSSH 7.4)
SETUP_SSH_HARDEN_CIPHERS="yes"

# Restrict SSH to specific users (space-separated). Leave empty to allow all.
# Example: "admin deploy"
SETUP_SSH_ALLOWED_USERS=""

# ─────────────────────────────────────────────
#  UFW FIREWALL
# ─────────────────────────────────────────────

# Enable UFW firewall (yes/no)
SETUP_UFW_ENABLE="yes"

# Default policies
SETUP_UFW_DEFAULT_INCOMING="deny"
SETUP_UFW_DEFAULT_OUTGOING="allow"

# Ports to allow (space-separated). SSH port is always added automatically.
# Examples:
#   "22"           — SSH only
#   "22 80 443"    — SSH + HTTP + HTTPS
#   "2222 80 443"  — custom SSH port + web
SETUP_UFW_ALLOWED_PORTS="22"

# ─────────────────────────────────────────────
#  PACKAGES
# ─────────────────────────────────────────────

# Base packages — always installed
SETUP_BASE_PACKAGES="curl wget git ufw fail2ban htop ncdu tmux rsync \
    ca-certificates software-properties-common apt-transport-https \
    unattended-upgrades net-tools dnsutils lsof jq less logrotate chrony \
    nano gnupg"

# Packages to remove (space-separated). Leave empty to skip.
SETUP_REMOVE_PACKAGES=""

# Optional packages (space-separated). Leave empty to skip.
# Supported magic values: micro  fish  docker
# Any other value is treated as a plain apt package name.
# Examples:
#   "micro"               — modern terminal editor
#   "micro fish"          — editor + fish shell
#   "micro docker"        — editor + Docker CE (from official repo)
#   "micro fish docker"   — all three
SETUP_OPTIONAL_PACKAGES=""

# ─────────────────────────────────────────────
#  AUTOMATIC SECURITY UPDATES
# ─────────────────────────────────────────────

# Enable unattended security updates (yes/no)
SETUP_AUTO_UPDATES="yes"

# Automatically reboot after updates if required (yes/no)
# If yes, reboots happen at 04:00
SETUP_AUTO_UPDATES_REBOOT="no"

# ─────────────────────────────────────────────
#  LOGGING
# ─────────────────────────────────────────────

# Path to setup log file
SETUP_LOG_FILE="/var/log/server-setup.log"
